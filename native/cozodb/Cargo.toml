[package]
name = "erlang-cozodb"
description = "Erlang NIF wrapper for CozoDB using Rustler."
authors = ["Alejandro M. Ramallo"]
version = "0.1.0"
edition = "2021"

[lib]
name = "cozodb"
path = "src/lib.rs"
crate-type = ["cdylib"]

[dependencies]
rustler = {version = "0.36.2", features = ["nif_version_2_17"]}
# Using local path temporarily to test new memory stats functionality
cozo = {git = "https://github.com/aramallo/cozo.git", tag = "v0.8.0-leapsight" }
uuid = "1.3.3"
threadpool = "1.8.1"
once_cell = "1.21.3"
num_cpus = "1.17.0"

# Memory allocator - jemalloc (optional, controlled by feature flag)
# Only compile on non-MSVC platforms when jemalloc feature is enabled
[target.'cfg(not(target_env = "msvc"))'.dependencies]
tikv-jemallocator = { version = "0.6", features = ["stats", "profiling"], optional = true }
tikv-jemalloc-ctl = { version = "0.6", features = ["stats", "profiling"], optional = true }
tikv-jemalloc-sys = { version = "0.6", features = ["stats", "profiling"], optional = true }

# ==============================================================================
# Pin the following to match cozo's working version
graph = "=0.3.1"  # uses graph_builder 0.4.0
graph_builder = "=0.4.0"  # uses rayon 1.10.0
rayon = "=1.10.0"
ndarray = "0.15.6"
serde_json = "1.0.116"
serde = { version = "1.0.199", features = ["derive"] }
serde_derive = "1.0.199"
lazy_static = "1.4.0"
crossbeam = "0.8.4"
# ==============================================================================

[features]
default = [
    "cozo/storage-sqlite",
    "cozo/storage-rocksdb",
    "cozo/graph-algo",
    "jemalloc"  # Re-enabled for memory profiling
]

# Use jemalloc as the global allocator (better for high concurrency, but more memory retention)
# Disable with: --no-default-features --features "cozo/storage-sqlite,cozo/storage-rocksdb,cozo/graph-algo"
jemalloc = ["tikv-jemallocator", "tikv-jemalloc-ctl", "tikv-jemalloc-sys"]

[target.'cfg(target_os = "linux")'.dependencies]
cozo = { git = "https://github.com/aramallo/cozo.git", tag = "v0.8.0-leapsight", features = ["io-uring"] }

