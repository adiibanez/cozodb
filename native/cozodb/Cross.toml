# Cross compilation configuration for cozodb NIF
# See: https://github.com/cross-rs/cross
#
# The cross images ship with libclang 3.8.x, but bindgen requires 5.0+
# for the clang_getTranslationUnitTargetInfo function.

[build.env]
passthrough = [
    "RUST_BACKTRACE",
    "LIBCLANG_PATH",
    "LLVM_CONFIG_PATH",
    "BINDGEN_EXTRA_CLANG_ARGS",
]

# ==============================================================================
# Linux GNU targets
# ==============================================================================

[target.aarch64-unknown-linux-gnu]
pre-build = [
    "apt-get update && apt-get install -y libclang-dev llvm-dev clang",
]

[target.arm-unknown-linux-gnueabihf]
pre-build = [
    "apt-get update && apt-get install -y libclang-dev llvm-dev clang",
]

[target.riscv64gc-unknown-linux-gnu]
pre-build = [
    "apt-get update && apt-get install -y libclang-dev llvm-dev clang",
]

# ==============================================================================
# Linux MUSL targets
# ==============================================================================

[target.x86_64-unknown-linux-musl]
pre-build = [
    "apt-get update && apt-get install -y libclang-dev llvm-dev clang",
]

[target.aarch64-unknown-linux-musl]
pre-build = [
    "apt-get update && apt-get install -y libclang-dev llvm-dev clang",
]
