# Cross compilation configuration for cozodb NIF
# See: https://github.com/cross-rs/cross
#
# The cross images ship with libclang 3.8.x, but bindgen requires 5.0+
# We use custom images that have LLVM pre-installed.

[build.env]
passthrough = [
    "RUST_BACKTRACE",
    "LIBCLANG_PATH",
    "LLVM_CONFIG_PATH",
    "BINDGEN_EXTRA_CLANG_ARGS",
    "CXXFLAGS",
]
# RocksDB requires C++20
variables = [
    ["CXXFLAGS", "-std=c++2a"],
]

# ==============================================================================
# Linux GNU targets - use cross images with LLVM
# ==============================================================================

# Note: These targets use older GCC cross-compilers that don't fully support C++20.
# We install clang and attempt to use it, but the cross-compilation toolchain
# may still use the default GCC. Some targets may fail due to C++20 incompatibility.

[target.aarch64-unknown-linux-gnu]
image = "ghcr.io/cross-rs/aarch64-unknown-linux-gnu:main"
pre-build = [
    "export DEBIAN_FRONTEND=noninteractive",
    "apt-get update && apt-get install -y libclang-dev clang llvm lld",
]

[target.arm-unknown-linux-gnueabihf]
image = "ghcr.io/cross-rs/arm-unknown-linux-gnueabihf:main"
pre-build = [
    "export DEBIAN_FRONTEND=noninteractive",
    "apt-get update && apt-get install -y libclang-dev clang llvm lld",
]

[target.riscv64gc-unknown-linux-gnu]
image = "ghcr.io/cross-rs/riscv64gc-unknown-linux-gnu:main"
pre-build = [
    "export DEBIAN_FRONTEND=noninteractive",
    "apt-get update && apt-get install -y libclang-dev clang llvm",
]

# ==============================================================================
# Linux MUSL targets
# ==============================================================================

[target.x86_64-unknown-linux-musl]
image = "ghcr.io/cross-rs/x86_64-unknown-linux-musl:main"
pre-build = [
    "export DEBIAN_FRONTEND=noninteractive",
    "apt-get update && apt-get install -y libclang-dev clang llvm lld",
]

[target.aarch64-unknown-linux-musl]
image = "ghcr.io/cross-rs/aarch64-unknown-linux-musl:main"
pre-build = [
    "export DEBIAN_FRONTEND=noninteractive",
    "apt-get update && apt-get install -y libclang-dev clang llvm lld",
]
