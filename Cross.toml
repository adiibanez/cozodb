# Cross compilation configuration for cozodb NIF
# See: https://github.com/cross-rs/cross
#
# The cross images ship with libclang 3.8.x, but bindgen requires 5.0+
# for the clang_getTranslationUnitTargetInfo function.
# We install LLVM 14 from the official LLVM apt repository.

[build.env]
passthrough = [
    "RUST_BACKTRACE",
    "LIBCLANG_PATH",
    "LLVM_CONFIG_PATH",
    "BINDGEN_EXTRA_CLANG_ARGS",
]

# ==============================================================================
# Linux GNU targets
# ==============================================================================

[target.aarch64-unknown-linux-gnu]
pre-build = [
    "apt-get update && apt-get install -y wget gnupg software-properties-common",
    "wget -qO- https://apt.llvm.org/llvm-snapshot.gpg.key | apt-key add -",
    "echo 'deb http://apt.llvm.org/focal/ llvm-toolchain-focal-14 main' >> /etc/apt/sources.list",
    "apt-get update && apt-get install -y llvm-14 clang-14 libclang-14-dev",
    "ln -sf /usr/bin/clang-14 /usr/bin/clang && ln -sf /usr/bin/llvm-config-14 /usr/bin/llvm-config",
]

