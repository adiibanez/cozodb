name: Build precompiled NIFs
'on':
  push:
    branches:
      - main
      - 'fix/**'
    tags:
      # Matches v0.3.2, v1.0.0, etc.
      - 'v*'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build_release:
    name: 'NIF ${{ matrix.nif }} - ${{ matrix.job.target }} (${{ matrix.job.os }})'
    runs-on: '${{ matrix.job.os }}'
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        nif:
          - '2.17'
        job:
          # macOS targets (native builds)
          - target: aarch64-apple-darwin
            os: macos-latest
          - target: x86_64-apple-darwin
            os: macos-latest
          # Linux x86_64 native build
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-24.04
          # Linux ARM64 native build on ARM runner
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-24.04-arm
          # Windows x86_64 native build (no jemalloc - not available on Windows)
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            cargo-args: --no-default-features --features windows-default
    steps:
      - name: Checkout source code
        uses: actions/checkout@v4
      - name: Extract project version
        shell: bash
        run: |
          # Get the project version from cozodb.app.src
          echo "PROJECT_VERSION=$(sed -n 's/.*{vsn, "\([^"]*\)".*/\1/p' src/cozodb.app.src | head -n1)" >> $GITHUB_ENV
      - name: Install build dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential clang libclang-dev pkg-config liburing-dev
          # RocksDB requires C++20
          echo "CXXFLAGS=-std=c++2a" >> $GITHUB_ENV
      - name: Install build dependencies (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install llvm pkg-config
      - name: Install build dependencies (Windows)
        if: runner.os == 'Windows'
        run: |
          choco install llvm -y
          # Set LIBCLANG_PATH for bindgen
          echo "LIBCLANG_PATH=C:\Program Files\LLVM\bin" >> $env:GITHUB_ENV
          # Force C++20 for MSVC (RocksDB requires it)
          echo "CXXFLAGS=/std:c++20" >> $env:GITHUB_ENV
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          target: '${{ matrix.job.target }}'
      - name: Install cross (for cross-compilation)
        if: matrix.job.use-cross == true
        run: |
          cargo install cross --git https://github.com/cross-rs/cross
      - name: Set cross environment
        if: matrix.job.use-cross == true
        run: |
          # Point cross to our config file
          echo "CROSS_CONFIG=${{ github.workspace }}/native/cozodb/Cross.toml" >> $GITHUB_ENV
          # RocksDB requires C++20
          echo "CXXFLAGS=-std=c++2a" >> $GITHUB_ENV
          # Debug: show Cross.toml content
          echo "Cross.toml content:"
          cat ${{ github.workspace }}/native/cozodb/Cross.toml
      - name: Build the project
        id: build-crate
        uses: philss/rustler-precompiled-action@v1.1.4
        with:
          project-name: cozodb
          project-version: '${{ env.PROJECT_VERSION }}'
          target: '${{ matrix.job.target }}'
          nif-version: '${{ matrix.nif }}'
          use-cross: '${{ matrix.job.use-cross }}'
          project-dir: native/cozodb
          cargo-args: '${{ matrix.job.cargo-args }}'
      - name: Artifact upload
        uses: actions/upload-artifact@v4
        with:
          name: '${{ steps.build-crate.outputs.file-name }}'
          path: '${{ steps.build-crate.outputs.file-path }}'
          retention-days: 5
      - name: Publish to GitHub Releases
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: '${{ steps.build-crate.outputs.file-path }}'
          make_latest: true
          generate_release_notes: true
