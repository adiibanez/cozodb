name: Build precompiled NIFs
'on':
  push:
    branches:
      - main
    tags:
      - '*'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build_release:
    name: 'NIF ${{ matrix.nif }} - ${{ matrix.job.target }} (${{ matrix.job.os }})'
    runs-on: '${{ matrix.job.os }}'
    strategy:
      fail-fast: false
      matrix:
        nif:
          - '2.17'
        job:
          # macOS targets (native builds)
          - target: aarch64-apple-darwin
            os: macos-latest
          - target: x86_64-apple-darwin
            os: macos-latest
          # Linux native build
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-24.04
          # Linux cross-compiled (riscv64 has newer GCC that supports C++20)
          - target: riscv64gc-unknown-linux-gnu
            os: ubuntu-24.04
            use-cross: true
          # DISABLED: These targets have GCC too old for C++20 (RocksDB requirement)
          # TODO: Create custom cross images with GCC 10+ to re-enable these
          # - target: arm-unknown-linux-gnueabihf
          #   os: ubuntu-24.04
          #   use-cross: true
          # - target: aarch64-unknown-linux-gnu
          #   os: ubuntu-24.04
          #   use-cross: true
          # - target: aarch64-unknown-linux-musl
          #   os: ubuntu-24.04
          #   use-cross: true
          # - target: x86_64-unknown-linux-musl
          #   os: ubuntu-24.04
          #   use-cross: true
    steps:
      - name: Checkout source code
        uses: actions/checkout@v4
      - name: Extract project version and branch/tag
        shell: bash
        run: |
          # Get the project version from cozodb.app.src
          echo "PROJECT_VERSION=$(sed -n 's/.*{vsn, "\([^"]*\)".*/\1/p' src/cozodb.app.src | head -n1)" >> $GITHUB_ENV

          # Determine if it's a tag or a branch
          if [[ "$GITHUB_REF" == refs/tags/* ]]; then
            BRANCH_OR_TAG="${GITHUB_REF#refs/tags/}"
          else
            BRANCH_OR_TAG="${GITHUB_REF#refs/heads/}"
          fi
          # Sanitize branch name: replace / with -
          BRANCH_OR_TAG="${BRANCH_OR_TAG//\//-}"
          echo "BRANCH_OR_TAG=$BRANCH_OR_TAG" >> $GITHUB_ENV
      - name: Install build dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential clang libclang-dev pkg-config liburing-dev
          # RocksDB requires C++20
          echo "CXXFLAGS=-std=c++2a" >> $GITHUB_ENV
      - name: Install build dependencies (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install llvm pkg-config
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          target: '${{ matrix.job.target }}'
      - name: Install cross (for cross-compilation)
        if: matrix.job.use-cross == true
        run: |
          cargo install cross --git https://github.com/cross-rs/cross
      - name: Set cross environment
        if: matrix.job.use-cross == true
        run: |
          # Point cross to our config file
          echo "CROSS_CONFIG=${{ github.workspace }}/native/cozodb/Cross.toml" >> $GITHUB_ENV
          # RocksDB requires C++20
          echo "CXXFLAGS=-std=c++2a" >> $GITHUB_ENV
          # Debug: show Cross.toml content
          echo "Cross.toml content:"
          cat ${{ github.workspace }}/native/cozodb/Cross.toml
      - name: Build the project
        id: build-crate
        uses: philss/rustler-precompiled-action@v1.1.4
        with:
          project-name: cozodb
          project-version: '${{ env.PROJECT_VERSION }}'
          target: '${{ matrix.job.target }}'
          nif-version: '${{ matrix.nif }}'
          use-cross: '${{ matrix.job.use-cross }}'
          project-dir: native/cozodb
      - name: Rename Artifact with Branch & Version
        shell: bash
        run: |
          echo "Debug: file-name = ${{ steps.build-crate.outputs.file-name }}"
          echo "Debug: file-path = ${{ steps.build-crate.outputs.file-path }}"
          echo "Debug: Listing current directory:"
          ls -la *.tar.gz 2>/dev/null || echo "No tar.gz files in current dir"
          ls -la native/cozodb/*.tar.gz 2>/dev/null || echo "No tar.gz files in native/cozodb"

          # Find the artifact file
          ARTIFACT_PATH="${{ steps.build-crate.outputs.file-path }}"
          if [ -z "$ARTIFACT_PATH" ] || [ ! -f "$ARTIFACT_PATH" ]; then
            echo "Output file-path not found, searching for artifact..."
            ARTIFACT_PATH=$(find . -name "*.tar.gz" -type f | head -1)
          fi

          if [ -z "$ARTIFACT_PATH" ] || [ ! -f "$ARTIFACT_PATH" ]; then
            echo "Error: Could not find artifact file"
            exit 1
          fi

          NEW_NAME="cozodb-${{ env.BRANCH_OR_TAG }}-${{ env.PROJECT_VERSION }}-${{ matrix.job.target }}.tar.gz"
          echo "Moving $ARTIFACT_PATH to $NEW_NAME"
          mv "$ARTIFACT_PATH" "$NEW_NAME"
          echo "RENAMED_ARTIFACT=$NEW_NAME" >> $GITHUB_ENV
      - name: Generate checksum
        shell: bash
        run: |
          if [[ "$RUNNER_OS" == "macOS" ]]; then
            shasum -a 256 "${{ env.RENAMED_ARTIFACT }}" > "${{ env.RENAMED_ARTIFACT }}.sha256"
          else
            sha256sum "${{ env.RENAMED_ARTIFACT }}" > "${{ env.RENAMED_ARTIFACT }}.sha256"
          fi
          echo "CHECKSUM_FILE=${{ env.RENAMED_ARTIFACT }}.sha256" >> $GITHUB_ENV
      - name: Artifact upload
        uses: actions/upload-artifact@v4
        with:
          name: '${{ env.RENAMED_ARTIFACT }}'
          path: |
            ${{ env.RENAMED_ARTIFACT }}
            ${{ env.CHECKSUM_FILE }}
      - name: Publish archives and packages
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ env.RENAMED_ARTIFACT }}
            ${{ env.CHECKSUM_FILE }}
        if: 'startsWith(github.ref, ''refs/tags/'')'
